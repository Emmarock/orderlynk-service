spring:
  application:
    name: orderlynk
  # Primary datastore is MySQL. Connection is overridable via env vars; the
  # database is auto-created on first connect for convenience in dev.
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/orderlynk?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Password123$}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    # Liquibase owns the schema; Hibernate never alters it.
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        # Store UUIDs as readable CHAR(36) rather than binary(16), on every dialect.
        type:
          preferred_uuid_jdbc_type: CHAR
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      # Vendor product photos; keep modest to avoid abuse.
      max-file-size: 5MB
      max-request-size: 5MB

server:
  # Render (and most PaaS) inject the listening port via $PORT.
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  # 256-bit+ secret for HS256 token signing. Override in production via APP_JWT_SECRET.
  jwt:
    secret: ${APP_JWT_SECRET:orderlynk-dev-secret-change-me-please-0123456789abcdef}
    ttl-seconds: 86400
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:5173}
  # AWS S3 for product images. Leave the bucket/credentials blank to disable uploads
  # (the app still boots; the upload endpoint then returns 503). The bucket must allow
  # public reads — either keep public-read-acl=true with ACLs enabled, or set it false
  # and grant read via a bucket policy. Set public-base-url to a CloudFront/CDN domain
  # to serve the same objects through it.
  aws:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    region: ${AWS_REGION:}
    s3-bucket: ${AWS_S3_BUCKET:}
    endpoint-url: ${AWS_S3_ENDPOINT:}
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
    public-read-acl: ${AWS_S3_PUBLIC_READ_ACL:false}
  # OpenAI for AI-generated product descriptions. Leave api-key blank to disable
  # (the app still boots; the generate endpoint then returns 503).
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
  ratings:
    # When true, only customers who have ordered from a vendor may rate it (prevents
    # rating abuse). Set false to let any signed-in user rate.
    require-purchase: ${APP_RATINGS_REQUIRE_PURCHASE:true}
  payout:
    weekly-cron: "0 0 6 * * MON"
  tokens:
    # Purge of used/expired email-verification & password-reset tokens.
    cleanup-cron: "0 30 3 * * *"
  fees:
    service-fee-rate: 0.03
    processing-rate: 0.029
    processing-fixed: 0.30
    logistics-margin-rate: 0.00
resend:
  # Leave the API key blank to disable email (the app still boots; emails are skipped + logged).
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:noreply@myorderlynk.com}
  from-name: ${RESEND_FROM_NAME:MyOrderLynk}

whatsapp:
  # Channel provider: "twilio" (default) or "meta". Leave the chosen provider's
  # credentials blank to disable WhatsApp (messages are skipped + logged).
  provider: ${WHATSAPP_PROVIDER:twilio}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from: ${TWILIO_WHATSAPP_FROM:}                      # e.g. +14155238886 (Twilio WhatsApp sandbox sender)
    messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}  # MG… — preferred for WhatsApp senders; used instead of `from`
    api-base-url: ${TWILIO_API_BASE_URL:https://api.twilio.com}
    # Public URL Twilio POSTs delivery status to (must reach /api/webhooks/twilio/status). Empty = no callbacks.
    status-callback-url: ${TWILIO_STATUS_CALLBACK_URL:}
    # Approved Content template SIDs (HX…) per event; blank = send free-form text (only works in the 24h window).
    templates:
      order-created: ${TWILIO_TPL_ORDER_CREATED:}
      order-status: ${TWILIO_TPL_ORDER_STATUS:}
      payment: ${TWILIO_TPL_PAYMENT:}
      vendor-new-order: ${TWILIO_TPL_VENDOR_NEW_ORDER:}
      vendor-order-status: ${TWILIO_TPL_VENDOR_ORDER_STATUS:}
      vendor-payment: ${TWILIO_TPL_VENDOR_PAYMENT:}
  meta:
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    api-base-url: ${WHATSAPP_API_BASE_URL:https://graph.facebook.com/v21.0}

shipping:
  # Active shipping partner: "shippo" today (the abstraction supports adding more).
  # Leave the chosen provider's token blank to disable live rates/labels — checkout then
  # falls back to the flat per-fulfillment logistics fee (app.fees.logistics.*).
  provider: ${SHIPPING_PROVIDER:shippo}
  shippo:
    api-token: ${SHIPPO_API_TOKEN:}
    api-version: ${SHIPPO_API_VERSION:2018-02-08}
    # Label format bought with a transaction: PDF4X6, PDF, PNG, ZPLII, PDF_A4, …
    label-file-type: ${SHIPPO_LABEL_FILE_TYPE:PDF4X6}
  # Fallback parcel used when a product has no weight/dimensions (grams + centimetres).
  defaults:
    weight-grams: ${SHIPPING_DEFAULT_WEIGHT_GRAMS:500}
    length-cm: ${SHIPPING_DEFAULT_LENGTH_CM:20}
    width-cm: ${SHIPPING_DEFAULT_WIDTH_CM:15}
    height-cm: ${SHIPPING_DEFAULT_HEIGHT_CM:10}

logging:
  level:
    com.myorderlynk: INFO

---
# Test profile: in-memory H2 so `./mvnw test` runs with no external database.
spring:
  config:
    activate:
      on-profile: test
  datasource:
    # H2 in MySQL-compatibility mode so the same Liquibase changelog applies.
    url: jdbc:h2:mem:orderlynk;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none

---
# Production profile: MySQL/TiDB, no demo seeding (DataSeeder is disabled under prod).
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: none
