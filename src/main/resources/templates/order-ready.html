<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ready for pickup</title>
</head>
<body style="margin:0;background:#faf7f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1c1917;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#faf7f2;padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #ece7df;">
        <tr><td style="background:#0f3d2e;padding:20px 32px;">
          <span style="color:#ffffff;font-size:20px;font-weight:700;letter-spacing:-0.3px;">MyOrderLynk</span>
        </td></tr>
        <tr><td style="padding:32px;">
          <h1 style="margin:0 0 12px;font-size:22px;">Your order is ready for pickup 📦</h1>
          <p style="margin:0 0 20px;line-height:1.6;color:#44403c;">
            Hi {{customerName}}, order <strong style="font-family:monospace;">{{orderId}}</strong> from {{vendorName}}
            is ready. Show this pickup code when you collect it:
          </p>
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
            <tr><td align="center" style="background:#faf7f2;border:1px dashed #c2562d;border-radius:12px;padding:18px;">
              <span style="font-family:monospace;font-size:32px;font-weight:700;letter-spacing:8px;color:#c2562d;">{{pickupCode}}</span>
            </td></tr>
          </table>
          <a href="{{trackUrl}}" style="display:inline-block;background:#c2562d;color:#ffffff;text-decoration:none;padding:12px 22px;border-radius:10px;font-weight:600;">View order</a>
        </td></tr>
        <tr><td style="padding:20px 32px;border-top:1px solid #ece7df;color:#9ca3af;font-size:12px;">© MyOrderLynk</td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
