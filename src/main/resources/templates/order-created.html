<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order received</title>
</head>
<body style="margin:0;background:#faf7f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1c1917;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#faf7f2;padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #ece7df;">
        <tr><td style="background:#0f3d2e;padding:20px 32px;">
          <span style="color:#ffffff;font-size:20px;font-weight:700;letter-spacing:-0.3px;">MyOrderLynk</span>
        </td></tr>
        <tr><td style="padding:32px;">
          <h1 style="margin:0 0 12px;font-size:22px;">We've got your order 🎉</h1>
          <p style="margin:0 0 20px;line-height:1.6;color:#44403c;">
            Hi {{customerName}}, {{vendorName}} has received your order. We'll let you know as it progresses.
          </p>
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#faf7f2;border:1px solid #ece7df;border-radius:12px;margin:0 0 24px;">
            <tr><td style="padding:16px 20px;">
              <p style="margin:0;color:#9ca3af;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Order</p>
              <p style="margin:4px 0 12px;font-size:18px;font-weight:700;font-family:monospace;">{{orderId}}</p>
              <p style="margin:0;color:#9ca3af;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Total</p>
              <p style="margin:4px 0 0;font-size:18px;font-weight:700;">{{total}}</p>
            </td></tr>
          </table>
          <a href="{{trackUrl}}" style="display:inline-block;background:#c2562d;color:#ffffff;text-decoration:none;padding:12px 22px;border-radius:10px;font-weight:600;">Track your order</a>
        </td></tr>
        <tr><td style="padding:20px 32px;border-top:1px solid #ece7df;color:#9ca3af;font-size:12px;">
          Questions about your order? Reply to this email or contact {{vendorName}} directly.<br>© MyOrderLynk
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
