# Render.com Blueprint for the Orderlynk backend (Spring Boot API, Docker).
# Lives at the root of the backend repo, so paths are relative to it.
#
# Render has no managed MySQL, so provision MySQL 8 or a TiDB cluster (TiDB Cloud)
# elsewhere and supply the connection details via the DB_* vars. The JDBC driver
# is the MySQL connector for both MySQL and TiDB.
#
# The frontend is a separate repo deployed as its own static site (see
# frontend/render.yaml). After the first deploy, fill the `sync: false` vars with
# the real service URLs.

services:
  - type: web
    name: orderlynk-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_JWT_SECRET
        generateValue: true
      - key: DB_URL
        sync: false   # jdbc:mysql://HOST:4000/orderlynk?useSSL=true&serverTimezone=UTC  (TiDB Cloud uses port 4000)
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: APP_CORS_ORIGINS
        sync: false   # frontend static-site URL, e.g. https://orderlynk-frontend.onrender.com
      - key: APP_PUBLIC_BASE_URL
        sync: false   # frontend static-site URL, used to build share links
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false
      - key: AWS_S3_PUBLIC_BASE_URL
        sync: false
      - key: AWS_S3_PUBLIC_READ_ACL
        sync: false
      # ---- Payment service integration ----
      - key: PAYMENT_SERVICE_ENABLED
        value: "true"
      - key: PAYMENT_SERVICE_URL
        sync: false   # https://orderlynk-payment-service.onrender.com
      - key: PAYMENT_EVENT_SIGNING_SECRET
        generateValue: true   # copy this value into the payment-service PAYMENT_EVENT_SIGNING_SECRET
