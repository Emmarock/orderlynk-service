# Render.com Blueprint for the Orderlynk backend (Spring Boot API, Docker).
# Lives at the root of the backend repo, so paths are relative to it.
#
# Provisions a managed Render PostgreSQL database (below) and auto-wires its
# connection into the service as DB_HOST/DB_PORT/DB_NAME/DB_USERNAME/DB_PASSWORD.
# The app composes the JDBC URL from those parts; Liquibase creates the schema on
# first boot. To point at an external DB instead, set DB_URL (it overrides the parts).
#
# The frontend is a separate repo deployed as its own static site (see
# frontend/render.yaml). After the first deploy, fill the `sync: false` vars with
# the real service URLs.

databases:
  - name: orderlynk-db
    databaseName: orderlynk
    user: orderlynk
    plan: free          # free Postgres is deleted after ~30 days — use a paid plan for real prod
    postgresMajorVersion: "16"
    ipAllowList: []     # internal-only: reachable solely by same-region Render services

services:
  - type: web
    name: orderlynk-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_JWT_SECRET
        generateValue: true
      # ---- Database: auto-wired from the managed Postgres above ----
      - key: DB_HOST
        fromDatabase:
          name: orderlynk-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: orderlynk-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: orderlynk-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: orderlynk-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: orderlynk-db
          property: password
      - key: APP_CORS_ORIGINS
        sync: false   # frontend static-site URL, e.g. https://orderlynk-frontend.onrender.com
      - key: APP_PUBLIC_BASE_URL
        sync: false   # frontend static-site URL, used to build share links
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false
      - key: AWS_S3_PUBLIC_BASE_URL
        sync: false
      - key: AWS_S3_PUBLIC_READ_ACL
        sync: false
      # ---- Payment service integration ----
      - key: PAYMENT_SERVICE_ENABLED
        value: "true"
      - key: PAYMENT_SERVICE_URL
        sync: false   # https://orderlynk-payment-service.onrender.com
      - key: PAYMENT_EVENT_SIGNING_SECRET
        generateValue: true   # copy this value into the payment-service PAYMENT_EVENT_SIGNING_SECRET
